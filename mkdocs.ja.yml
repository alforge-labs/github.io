site_name: AlphaForge ドキュメント
site_url: https://alforgelabs.com/ja/docs/
site_description: AlphaForge CLI 公式ドキュメント — インストール、コマンド、戦略テンプレート、AI エージェント連携。
site_author: Alforge Labs

docs_dir: mkdocs_src/ja
site_dir: ja/docs
use_directory_urls: true

theme:
  name: material
  language: ja
  palette:
    - scheme: slate
      primary: black
      accent: amber
  font:
    text: Space Grotesk
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

extra:
  homepage: https://alforgelabs.com/ja/index.html
  alternate:
    - name: 日本語
      link: /ja/docs/
      lang: ja
    - name: English
      link: /en/docs/
      lang: en

plugins:
  - search:
      lang: ja

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - ホーム: index.md
  - はじめに:
      - クイックスタートと詳細インストール: getting-started.md
      - フリーミアム制限: guides/freemium-limits.md
  - ガイド:
      - エンドツーエンド戦略開発ワークフロー: guides/end-to-end-workflow.md
      - 実行結果と成果物サンプル: guides/output-examples.md
      - TradingView への Pine Script 反映: guides/tradingview-pine-integration.md
      - TradingView と alpha-strike の連携: guides/tradingview-alpha-strike.md
      - AI エージェント連携: ai-driven-forges.md
      - 目的別ユースケース:
          - 概要: usecases/index.md
          - TradingViewユーザー: usecases/tradingview.md
          - Python開発者: usecases/python-dev.md
          - クオンツ・研究者: usecases/quants.md
          - 自動売買検討者: usecases/auto-trading.md
          - AIエージェント利用者: usecases/ai-agents.md
          - 他ツールとの比較: usecases/comparison.md
  - 戦略カタログ:
      - 戦略テンプレート: templates.md
      - 戦略実例ギャラリー: strategy-gallery.md
  - CLI リファレンス:
      - 概要: cli-reference/index.md
      - backtest: cli-reference/backtest.md
      - optimize: cli-reference/optimize.md
      - strategy: cli-reference/strategy.md
      - data: cli-reference/data.md
      - journal: cli-reference/journal.md
      - live: cli-reference/live.md
      - その他コマンド: cli-reference/other.md
  - 利用規約と免責:
      - 信頼・安全・制限: legal/trust-safety-limits.md
      - 免責事項: legal/disclaimers.md
      - EULA: legal/eula.md
      - プライバシーポリシー: legal/privacy.md
