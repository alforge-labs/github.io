site_name: AlphaForge Documentation
site_url: https://alforgelabs.com/en/docs/
site_description: AlphaForge CLI official documentation — installation, commands, strategy templates, and AI agent integration.
site_author: Alforge Labs

docs_dir: mkdocs_src/en
site_dir: en/docs
use_directory_urls: true

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: black
      accent: amber
  font:
    text: Space Grotesk
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

extra:
  homepage: https://alforgelabs.com/en/index.html
  alternate:
    - name: 日本語
      link: /ja/docs/
      lang: ja
    - name: English
      link: /en/docs/
      lang: en

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli-reference.md
  - Strategy Templates: templates.md
  - AI Agent Integration: ai-driven-forges.md
  - Legal & Disclaimers: legal.md
