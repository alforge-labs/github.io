site_name: AlphaForge Documentation
site_url: https://alforgelabs.com/en/docs/
site_description: AlphaForge CLI official documentation — installation, commands, strategy templates, and AI agent integration.
site_author: Alforge Labs

docs_dir: mkdocs_src/en
site_dir: en/docs
use_directory_urls: true

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: black
      accent: amber
  font:
    text: Space Grotesk
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

extra:
  homepage: https://alforgelabs.com/en/index.html
  alternate:
    - name: 日本語
      link: /ja/docs/
      lang: ja
    - name: English
      link: /en/docs/
      lang: en

plugins:
  - search:
      lang: en

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart & Detailed Installation: getting-started.md
      - Freemium Limits: guides/freemium-limits.md
  - Guides:
      - End-to-End Strategy Development Workflow: guides/end-to-end-workflow.md
      - Output Examples: guides/output-examples.md
      - Bringing Pine Scripts into TradingView: guides/tradingview-pine-integration.md
      - TradingView × alpha-strike Integration: guides/tradingview-alpha-strike.md
      - AI-Driven Strategy Exploration Workflow: guides/ai-exploration-workflow.md
      - Use Cases by Goal:
          - Overview: usecases/index.md
          - TradingView Users: usecases/tradingview.md
          - Python Developers: usecases/python-dev.md
          - Quants & Researchers: usecases/quants.md
          - Automated Trading: usecases/auto-trading.md
          - AI Agent Users: usecases/ai-agents.md
          - Comparison with Other Tools: usecases/comparison.md
  - Strategy Catalog:
      - Strategy Templates: templates.md
      - Strategy Gallery: strategy-gallery.md
  - alpha-visualizer: alpha-visualizer.md
  - CLI Reference:
      - Overview: cli-reference/index.md
      - backtest: cli-reference/backtest.md
      - optimize: cli-reference/optimize.md
      - strategy: cli-reference/strategy.md
      - data: cli-reference/data.md
      - journal: cli-reference/journal.md
      - live: cli-reference/live.md
      - Other commands: cli-reference/other.md
  - Legal & Disclaimers:
      - Trust, Safety, and Limits: legal/trust-safety-limits.md
      - Disclaimers: legal/disclaimers.md
      - EULA: legal/eula.md
      - Privacy Policy: legal/privacy.md
