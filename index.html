<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <title>Alforge Labs</title>
  <link rel="canonical" href="https://alforgelabs.com/ja/" />
  <link rel="alternate" hreflang="ja" href="https://alforgelabs.com/ja/" />
  <link rel="alternate" hreflang="en" href="https://alforgelabs.com/en/" />
  <link rel="alternate" hreflang="x-default" href="https://alforgelabs.com/" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-K8LQ5G28RY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-K8LQ5G28RY');
  </script>
  <script>
    (function() {
      var saved = localStorage.getItem('al_lang');
      if (saved) {
        window.location.replace('/' + saved + '/');
        return;
      }
      var lang = (navigator.language || navigator.userLanguage || 'ja').toLowerCase();
      window.location.replace(lang.startsWith('ja') ? '/ja/' : '/en/');
    })();
  </script>
  <noscript><meta http-equiv="refresh" content="0;url=/ja/" /></noscript>
</head>
<body>
  <p><a href="/ja/">日本語</a> / <a href="/en/">English</a></p>
